<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Catsoft Supplier Center</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="stylesheet" href="supplier-center.css?v=20260529-customer-center" />
</head>
<body class="supplier-console-body">
  <main class="supplier-console-page">
    <header class="supplier-console-topbar">
      <a class="supplier-console-brand" href="https://supplier.catsoft.store/" aria-label="Catsoft Supplier Center">
        <img src="logo.png" alt="Catsoft" />
      </a>
      <nav class="supplier-console-tabs" aria-label="Navigasi Supplier">
        <a class="is-active" href="https://supplier.catsoft.store/">Ikhtisar</a>
        <a href="https://supplier.catsoft.store/mail">Email</a>
      </nav>
      <nav class="admin-nav supplier-console-actions" aria-label="Akun Supplier"></nav>
    </header>

    <section class="supplier-console-shell">
      <section class="supplier-hero" aria-labelledby="supplierTitle">
        <div>
          <span>Supplier Center</span>
          <h1 id="supplierTitle">Pusat Supplier Catsoft</h1>
          <p>Buka tools supplier, pantau email yang diizinkan, dan kelola alamat penerima sesuai akses yang diberikan.</p>
        </div>
      </section>

      <section class="supplier-metrics" aria-label="Ringkasan Supplier Center">
        <article>
          <span>Tools Aktif</span>
          <strong data-supplier-summary="tools">1 Aktif</strong>
        </article>
        <article>
          <span>Akses</span>
          <strong>Supplier</strong>
        </article>
      </section>

      <section class="supplier-panel" aria-labelledby="supplierToolsTitle">
        <div class="supplier-panel-head">
          <h2 id="supplierToolsTitle">Tools Supplier</h2>
        </div>
        <div class="supplier-tool-table">
          <a class="supplier-tool-row" data-supplier-tool-card="supplier-email" href="https://supplier.catsoft.store/mail">
            <span class="supplier-tool-main">
              <span class="supplier-tool-icon" aria-hidden="true"></span>
              <span>
                <strong>Email Center</strong>
                <small>Temp mail dan inbox supplier</small>
              </span>
            </span>
            <span class="supplier-tool-status">Aktif</span>
          </a>
          <div class="supplier-empty" data-supplier-empty hidden>
            Akun ini belum memiliki tools aktif.
          </div>
        </div>
      </section>
    </section>
  </main>
  <script src="supplier-auth.js?v=20260529-customer-center" defer></script>
</body>
</html>
