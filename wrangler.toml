name = "catsoft"
main = "cloudflare-email-worker.example.js"
compatibility_date = "2026-05-25"
account_id = "9b19f1b31d88513e013d1a522e583c08"

# HTTP routes are assigned from the Cloudflare dashboard after unassigning
# them from the email-only Worker `mail-base-all-catch`.

[[d1_databases]]
binding = "ADMIN_DB"
database_name = "admin_accounts"
database_id = "05cdff0f-1d32-49a3-97d0-1e240655c66c"

[[d1_databases]]
binding = "CUSTOMER_DB"
database_name = "catsoft-customer-db"
database_id = "1e575674-84ef-4f09-a151-6f80e36bab5d"

[[d1_databases]]
binding = "EMAIL_DB"
database_name = "email-db"
database_id = "17d3485b-c3f1-40a7-b583-f58ebd63bd87"

[vars]
FORWARD_TO = "cundigitora@gmail.com"
# Untuk testing sementara saja. Hapus atau ubah ke false jika API sudah dilindungi token/Access.
ALLOW_UNAUTHENTICATED_API = "true"
