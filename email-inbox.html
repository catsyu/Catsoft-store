<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Catsoft Email Inbox</title>
  <script src="admin-tool-redirect.js?v=20260531-single-console"></script>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="stylesheet" href="form-standard.css" />
  <link rel="stylesheet" href="email-inbox.css?v=20260530-search-icon-align" />
</head>
<body>
  <main class="email-page">
    <header class="email-header">
      <div class="brand-mark">
        <img src="logo.png" alt="Catsoft" />
        <div>
          <span>Catsoft Tools</span>
          <h1>Email Inbox</h1>
        </div>
      </div>
      <div class="header-actions">
        <a class="ghost-button" href="https://admin.catsoft.store/">Home</a>
        <button class="ghost-button" id="refreshBtn" type="button">Refresh</button>
      </div>
    </header>

    <section class="inbox-layout" aria-label="Email Masuk Catsoft">
      <section class="inbox-panel" aria-labelledby="inboxTitle">
        <div class="panel-heading">
          <div>
            <span class="section-kicker">Inbox</span>
            <h2 id="inboxTitle">Semua Email Masuk</h2>
          </div>
          <p class="sync-status" id="syncStatus" aria-live="polite">Memuat</p>
        </div>

        <div class="inbox-quick-row">
          <div class="stats-grid" aria-label="Ringkasan Email">
            <button class="stat-card compact-stat" type="button" data-stat-filter="all">
              <span>Semua</span>
            </button>
            <button class="stat-card urgent" type="button" data-stat-filter="unread">
              <span>Belum Dibaca</span>
              <strong id="unreadCount">0</strong>
            </button>
            <button class="stat-card spam" type="button" data-stat-filter="spam">
              <span>Spam</span>
              <strong id="spamCount">0</strong>
            </button>
          </div>

          <button class="temp-mail-toggle" id="tempMailToggle" type="button" aria-expanded="false" aria-controls="tempMailPanel">
            <span>Generate Email</span>
            <small>Buat alamat penerima baru</small>
          </button>
        </div>

        <section class="temp-mail-panel" id="tempMailPanel" aria-label="Generate Email Admin" hidden>
          <label class="field-group">
            <span>Username</span>
            <input id="tempMailAlias" type="text" inputmode="email" placeholder="Kosongkan untuk nama otomatis" autocomplete="off" />
          </label>
          <label class="field-group">
            <span>Domain</span>
            <select id="tempMailDomain">
              <option value="catsoft.store">catsoft.store</option>
              <option value="catsoft.digital">catsoft.digital</option>
              <option value="catsoft.online">catsoft.online</option>
              <option value="ask1q2.uk">ask1q2.uk</option>
              <option value="fadisa1.uk">fadisa1.uk</option>
              <option value="gasddqw1.uk">gasddqw1.uk</option>
              <option value="kulamusic.us">kulamusic.us</option>
              <option value="wkwkksks.uk">wkwkksks.uk</option>
              <option value="malibus.org">malibus.org</option>
            </select>
          </label>
          <div class="temp-mail-output">
            <span id="tempMailAddress">Klik Generate Email</span>
            <div class="temp-mail-actions">
              <button class="secondary-button" id="generateTempMailAddress" type="button">Generate</button>
              <button class="secondary-button" id="copyTempMailAddress" type="button">Salin Email</button>
            </div>
          </div>
        </section>

        <button class="mobile-collapse-toggle" id="emailControlToggle" type="button" aria-expanded="false" aria-controls="emailControlPanel">
          <span>Filter &amp; Aksi</span>
          <strong>Tampilkan</strong>
        </button>

        <div class="mobile-collapsible-panel" id="emailControlPanel">
          <form class="filter-panel" id="filterForm">
            <label class="field-group recipient-field">
              <span>Penerima</span>
              <input id="recipientFilter" type="email" placeholder="chatgpt@catsoft.store" autocomplete="off" />
            </label>

            <label class="field-group">
              <span>Domain</span>
              <select id="domainFilter">
                <option value="all">Semua</option>
                <option value="catsoft.store">catsoft.store</option>
                <option value="catsoft.digital">catsoft.digital</option>
                <option value="catsoft.online">catsoft.online</option>
                <option value="ask1q2.uk">ask1q2.uk</option>
                <option value="fadisa1.uk">fadisa1.uk</option>
                <option value="gasddqw1.uk">gasddqw1.uk</option>
                <option value="kulamusic.us">kulamusic.us</option>
                <option value="wkwkksks.uk">wkwkksks.uk</option>
                <option value="malibus.org">malibus.org</option>
              </select>
            </label>

            <label class="field-group">
              <span>Kategori</span>
              <select id="categoryFilter">
                <option value="all">Semua</option>
                <option value="chatgpt-otp">ChatGPT</option>
                <option value="adobe">Adobe</option>
                <option value="spam">Spam</option>
                <option value="other">Lainnya</option>
              </select>
            </label>

            <label class="field-group">
              <span>Status</span>
              <select id="statusFilter">
                <option value="all">Semua</option>
                <option value="unread">Belum Dibaca</option>
                <option value="read">Dibaca</option>
              </select>
            </label>

            <label class="field-group search-field">
              <span>Cari</span>
              <input id="keywordFilter" type="search" placeholder="Subjek, Pengirim, Isi" autocomplete="off" />
            </label>
          </form>

          <div class="category-tabs" id="categoryTabs" aria-label="Filter Kategori Cepat">
            <button class="category-tab active" type="button" data-category-tab="all">Semua</button>
            <button class="category-tab" type="button" data-category-tab="chatgpt-otp">ChatGPT</button>
            <button class="category-tab" type="button" data-category-tab="adobe">Adobe</button>
            <button class="category-tab" type="button" data-category-tab="spam">Spam</button>
          </div>

          <div class="bulk-toolbar" id="bulkToolbar" aria-label="Aksi Email">
            <label class="bulk-select-all">
              <input id="selectAllEmails" type="checkbox" />
              <span>Pilih Semua</span>
            </label>
            <strong id="selectedEmailCount">0 Dipilih</strong>
            <button class="secondary-button" type="button" data-bulk-action="read">Tandai Dibaca</button>
            <button class="secondary-button" type="button" data-bulk-action="unread">Tandai Belum Dibaca</button>
            <button class="secondary-button" type="button" data-bulk-action="spam">Pindah Ke Spam</button>
            <button class="secondary-button" type="button" data-bulk-action="inbox">Kembalikan Ke Inbox</button>
            <button class="danger-button" type="button" data-bulk-action="delete">Hapus</button>
            <button class="secondary-button" type="button" data-bulk-action="clear">Bersihkan</button>
          </div>
        </div>

        <div class="email-list" id="emailList" aria-live="polite">
          <p class="empty-state">Memuat email masuk.</p>
        </div>
      </section>

      <aside class="message-panel" id="messagePanel" aria-live="polite">
        <div class="detail-empty">
          <span class="section-kicker">Detail Email</span>
          <h2>Pilih Email</h2>
        </div>
      </aside>
    </section>
  </main>

  <script>
    if (new URLSearchParams(window.location.search).get('customer') === '1' || window.location.hostname.toLowerCase() === 'customer.catsoft.store') {
      window.CATSOFT_SKIP_ADMIN_AUTH = true;
      window.CATSOFT_CUSTOMER_AUTH_REQUIRED = true;
    }
  </script>
  <script src="catsoft-domains.js?v=20260601-cloudflare-domains" defer></script>
  <script src="admin-auth.js?v=20260601-cloudflare-domains" defer></script>
  <script src="supplier-email.js?v=20260601-cloudflare-domains" defer></script>
  <script src="customer-auth.js?v=20260529-customer-email-access" defer></script>
  <script src="email-inbox.js?v=20260529-contextual-bulk" defer></script>
</body>
</html>
