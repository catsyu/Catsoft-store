<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Catsoft Supplier Email</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="stylesheet" href="email-inbox.css" />
  <link rel="stylesheet" href="form-standard.css" />
</head>
<body>
  <main class="email-page">
    <header class="email-header">
      <div class="brand-mark">
        <img src="logo.png" alt="Catsoft" />
        <div>
          <span>Catsoft Supplier</span>
          <h1>Email</h1>
        </div>
      </div>
      <div class="header-actions">
        <a class="ghost-button" href="supplier-center.html">Home</a>
        <button class="ghost-button" id="refreshBtn" type="button">Refresh</button>
      </div>
    </header>

    <section class="inbox-layout" aria-label="Email temp mail supplier">
      <section class="inbox-panel" aria-labelledby="inboxTitle">
        <div class="panel-heading">
          <div>
            <span class="section-kicker">Temp mail</span>
            <h2 id="inboxTitle">Email masuk</h2>
          </div>
          <p class="sync-status" id="syncStatus" aria-live="polite">Memuat...</p>
        </div>

        <div class="stats-grid" aria-label="Ringkasan email">
          <button class="stat-card compact-stat" type="button" data-stat-filter="all">
            <span>Total</span>
          </button>
          <button class="stat-card urgent" type="button" data-stat-filter="unread">
            <span>Belum dibaca</span>
            <strong id="unreadCount">0</strong>
          </button>
        </div>

        <section class="temp-mail-panel" aria-label="Buat alamat temp mail">
          <label class="field-group">
            <span>Alias</span>
            <input id="tempMailAlias" type="text" inputmode="email" placeholder="supplier-openai" autocomplete="off" />
          </label>
          <label class="field-group">
            <span>Domain</span>
            <select id="tempMailDomain">
              <option value="catsoft.store">catsoft.store</option>
              <option value="catsoft.digital">catsoft.digital</option>
              <option value="catsoft.online">catsoft.online</option>
            </select>
          </label>
          <div class="temp-mail-output">
            <span id="tempMailAddress">supplier-openai@catsoft.store</span>
            <button class="secondary-button" id="copyTempMailAddress" type="button">Copy Email</button>
          </div>
          <p class="temp-mail-status" id="tempMailStatus" aria-live="polite"></p>
        </section>

        <button class="mobile-collapse-toggle" id="emailControlToggle" type="button" aria-expanded="false" aria-controls="emailControlPanel">
          <span>Filter &amp; bulk action</span>
          <strong>Tampilkan</strong>
        </button>

        <div class="mobile-collapsible-panel" id="emailControlPanel">
          <form class="filter-panel" id="filterForm">
            <label class="field-group recipient-field">
              <span>Penerima</span>
              <input id="recipientFilter" type="email" placeholder="supplier@catsoft.store" autocomplete="off" />
            </label>

            <label class="field-group">
              <span>Domain</span>
              <select id="domainFilter">
                <option value="all">Semua</option>
                <option value="catsoft.store">catsoft.store</option>
                <option value="catsoft.digital">catsoft.digital</option>
                <option value="catsoft.online">catsoft.online</option>
              </select>
            </label>

            <label class="field-group">
              <span>Kategori</span>
              <select id="categoryFilter">
                <option value="all">Semua</option>
                <option value="chatgpt-otp">ChatGPT</option>
                <option value="adobe">Adobe</option>
                <option value="canva">Canva</option>
                <option value="support">Support</option>
                <option value="other">Lainnya</option>
              </select>
            </label>

            <label class="field-group">
              <span>Status</span>
              <select id="statusFilter">
                <option value="all">Semua</option>
                <option value="unread">Belum dibaca</option>
                <option value="read">Dibaca</option>
              </select>
            </label>

            <label class="field-group search-field">
              <span>Cari</span>
              <input id="keywordFilter" type="search" placeholder="Subject, pengirim, isi" autocomplete="off" />
            </label>
          </form>

          <div class="bulk-toolbar" id="bulkToolbar" aria-label="Bulk action email">
            <label class="bulk-select-all">
              <input id="selectAllEmails" type="checkbox" />
              <span>Pilih semua</span>
            </label>
            <strong id="selectedEmailCount">0 dipilih</strong>
            <button class="secondary-button" type="button" data-bulk-action="read">Tandai dibaca</button>
            <button class="secondary-button" type="button" data-bulk-action="unread">Tandai belum dibaca</button>
            <button class="danger-button" type="button" data-bulk-action="delete">Hapus</button>
            <button class="secondary-button" type="button" data-bulk-action="clear">Clear</button>
          </div>
        </div>

        <div class="email-list" id="emailList" aria-live="polite">
          <p class="empty-state">Memuat email masuk.</p>
        </div>
      </section>

      <aside class="message-panel" id="messagePanel" aria-live="polite">
        <div class="detail-empty">
          <span class="section-kicker">Detail email</span>
          <h2>Pilih email</h2>
        </div>
      </aside>
    </section>
  </main>

  <script src="supplier-auth.js?v=20260527-1" defer></script>
  <script src="supplier-email.js?v=20260527-1" defer></script>
  <script src="email-inbox.js?v=20260527-3" defer></script>
</body>
</html>
