<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Catsoft Admin Access</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="stylesheet" href="admin-tools.css?v=20260530-access-save-fix" />
  <link rel="stylesheet" href="form-standard.css" />
</head>
<body>
  <main class="admin-page access-page">
    <header class="admin-header">
      <div class="brand-mark">
        <img src="logo.png" alt="Catsoft" />
        <div>
          <span>Catsoft Tools</span>
          <h1>Admin Access</h1>
        </div>
      </div>
      <nav class="admin-nav" aria-label="Navigasi Admin">
        <a class="ghost-button" href="https://admin.catsoft.store/">Admin Tools</a>
        <a class="ghost-button" href="https://catsoft.store/">Website</a>
      </nav>
    </header>

    <section class="overview-band access-hero" aria-labelledby="accessTitle">
      <div class="panel-heading">
        <span class="section-kicker">Owner Workspace</span>
        <h2 id="accessTitle">Kelola Akses Admin</h2>
        <p>Tambahkan akun admin, pilih tool yang boleh dibuka, dan atur cakupan Email Inbox berdasarkan layanan, domain, alamat email, atau keyword bebas.</p>
      </div>
      <div class="access-summary">
        <div>
          <span>Owner</span>
          <strong>OwnerCatsoft</strong>
        </div>
        <div>
          <span>Scope</span>
          <strong>Tools & Inbox</strong>
        </div>
      </div>
    </section>

    <section id="adminAccessRoot" aria-label="Pengaturan Akses Admin"></section>
  </main>
  <script src="admin-auth.js?v=20260530-access-save-fix" defer></script>
</body>
</html>
