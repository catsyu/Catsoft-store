<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Catsoft Supplier Center Access</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="stylesheet" href="admin-tools.css" />
  <link rel="stylesheet" href="form-standard.css" />
</head>
<body>
  <main class="admin-page access-page">
    <header class="admin-header">
      <div class="brand-mark">
        <img src="logo.png" alt="Catsoft" />
        <div>
          <span>Catsoft Tools</span>
          <h1>Supplier Access</h1>
        </div>
      </div>
      <nav class="admin-nav" aria-label="Navigasi admin">
        <a class="ghost-button" href="https://supplier.catsoft.store/">Supplier Center</a>
        <a class="ghost-button" href="https://admin.catsoft.store/">Admin Tools</a>
      </nav>
    </header>

    <section class="overview-band access-hero" aria-labelledby="supplierAccessTitle">
      <div class="panel-heading">
        <span class="section-kicker">Supplier workspace</span>
        <h2 id="supplierAccessTitle">Kelola akses supplier</h2>
        <p>Buat akun supplier dan atur cakupan Email Temp Mail berdasarkan layanan, domain, alamat email, atau keyword bebas.</p>
      </div>
      <div class="access-summary">
        <div>
          <span>Manager</span>
          <strong>Owner/Admin</strong>
        </div>
        <div>
          <span>Scope</span>
          <strong>Supplier Email</strong>
        </div>
      </div>
    </section>

    <section id="supplierAccessRoot" aria-label="Pengaturan akses supplier"></section>
  </main>
  <script src="admin-auth.js?v=20260527-3" defer></script>
</body>
</html>
