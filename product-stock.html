<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Catsoft Product Stock</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="stylesheet" href="admin-tools.css?v=20260530-stock-limit-fix" />
  <link rel="stylesheet" href="form-standard.css" />
  <link rel="stylesheet" href="product-stock.css?v=20260530-stock-limit-fix" />
</head>
<body class="product-stock-body">
  <main class="product-stock-page">
    <section class="admin-access-panel admin-access-page-panel stock-panel" aria-labelledby="stockTitle">
      <div class="admin-spectrum-page">
        <div class="admin-spectrum-head">
          <h2 id="stockTitle">Akun Stok</h2>
          <dl>
            <div>
              <dt>Total Akun</dt>
              <dd data-stock-total>0</dd>
            </div>
            <div>
              <dt>Perlu Reset</dt>
              <dd data-stock-reset>0</dd>
            </div>
          </dl>
        </div>
        <div class="admin-spectrum-rule"></div>
        <div class="admin-spectrum-toolbar">
          <label class="admin-spectrum-search">
            <span>Cari</span>
            <span class="admin-spectrum-search-field">
              <input type="search" data-stock-search autocomplete="off" placeholder="Produk, Akun, Atau Login" />
            </span>
          </label>
          <div class="admin-spectrum-actions">
            <button class="admin-spectrum-primary" type="button" data-stock-add>Tambah Stok</button>
            <button class="admin-spectrum-secondary" type="button" data-stock-refresh>Refresh</button>
          </div>
        </div>
        <p class="admin-access-status" data-stock-status aria-live="polite"></p>
        <div class="stock-bulk-toolbar" data-stock-bulk-toolbar>
          <label class="stock-select-all">
            <input type="checkbox" data-stock-select-visible />
            <span>Pilih Semua</span>
          </label>
          <span class="stock-selected-count" data-stock-selected-count>0 Dipilih</span>
          <select data-stock-bulk-status aria-label="Status Bulk">
            <option value="">Ubah Status</option>
            <option value="active">Aktif</option>
            <option value="full">Penuh</option>
            <option value="reset">Perlu Reset</option>
            <option value="paused">Jeda</option>
          </select>
          <button class="admin-spectrum-secondary" type="button" data-stock-bulk-apply disabled>Terapkan</button>
          <button class="admin-spectrum-secondary stock-danger-action" type="button" data-stock-bulk-delete disabled>Hapus</button>
        </div>
        <div class="admin-account-list" data-stock-list></div>
      </div>
    </section>

    <div class="admin-detail-scrim" data-stock-scrim hidden></div>
    <aside class="admin-detail-drawer stock-drawer" data-stock-drawer aria-label="Edit Stok Produk" hidden>
      <div class="admin-detail-head">
        <span class="admin-detail-avatar" data-stock-avatar aria-hidden="true">ST</span>
        <div>
          <h3 data-stock-drawer-title>Tambah Akun Stok</h3>
          <span class="admin-detail-role">Database Stok Produk</span>
        </div>
        <div class="admin-detail-actions">
          <button class="admin-detail-save" type="submit" form="stockForm">Simpan</button>
          <button class="admin-detail-close" type="button" data-stock-close aria-label="Tutup">×</button>
        </div>
      </div>

      <form class="admin-access-form admin-detail-form" id="stockForm" data-stock-form>
        <input type="hidden" data-stock-id />
        <section class="admin-detail-section">
          <div class="admin-detail-section-head">
            <h4>Profil Stok</h4>
          </div>
          <label>
            Produk
            <input type="text" data-stock-product list="stockProductList" placeholder="ChatGPT" required />
            <datalist id="stockProductList">
              <option value="ChatGPT"></option>
              <option value="Canva Pro"></option>
              <option value="CapCut Pro"></option>
              <option value="Microsoft Office"></option>
              <option value="Redeem Code"></option>
            </datalist>
          </label>
          <label>
            Nama Akun Stok
            <input type="text" data-stock-account-name placeholder="ChatGPT Sharing 1" required />
          </label>
          <div class="stock-inline-grid">
            <label>
              Tipe Stok
              <select data-stock-type>
                <option value="account">Akun</option>
                <option value="redeem_code">Redeem Code</option>
              </select>
            </label>
            <label>
              Biaya Stok
              <input type="text" inputmode="numeric" data-stock-cost value="Rp 0" />
            </label>
            <label>
              Kapasitas
              <input type="number" min="1" max="500" step="1" data-stock-capacity value="7" required />
            </label>
            <label>
              Status
              <select data-stock-status-field>
                <option value="active">Aktif</option>
                <option value="full">Penuh</option>
                <option value="reset">Perlu Reset</option>
                <option value="paused">Jeda</option>
              </select>
            </label>
          </div>
        </section>

        <section class="admin-detail-section">
          <div class="admin-detail-section-head">
            <h4>Akses Akun</h4>
          </div>
          <label>
            Username Login
            <input type="text" data-stock-login-username autocomplete="off" />
          </label>
          <label>
            Password Login
            <input type="text" data-stock-login-password autocomplete="off" />
          </label>
          <label>
            Jadwal Reset
            <input type="date" data-stock-reset-at data-empty-label="Pilih Tanggal" />
          </label>
          <label>
            Catatan Reset
            <textarea data-stock-notes rows="3" placeholder="Contoh: reset setiap 7 customer selesai atau saat akun penuh."></textarea>
          </label>
        </section>

        <section class="admin-detail-section">
          <div class="admin-detail-section-head">
            <h4>Customer Join</h4>
            <button class="stock-mini-stat stock-joined-toggle" type="button" data-stock-joined-summary data-stock-joined-toggle aria-expanded="false">0/7 Aktif</button>
          </div>
          <div class="stock-joined-list" data-stock-joined-list hidden>
            <p>Data join akan muncul setelah username login cocok dengan database customer.</p>
          </div>
        </section>

        <section class="admin-detail-section stock-danger-zone" data-stock-delete-section hidden>
          <button class="admin-spectrum-secondary" type="button" data-stock-delete>Hapus Akun Stok</button>
        </section>
      </form>
    </aside>
  </main>
  <script src="admin-auth.js?v=20260530-stock-limit-fix" defer></script>
  <script src="product-stock.js?v=20260530-stock-limit-fix" defer></script>
</body>
</html>
